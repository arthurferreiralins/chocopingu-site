<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mundo Chocopingu — Encontre a gente no mapa</title>
<meta name="description" content="Mapa interativo Chocopingu: lojas, pontos de revenda, retirada e áreas de entrega perto de você." />
<link rel="icon" href="../imagens/logo2.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
:root{
  --br:#1A0A00;--br2:#2A1508;--br3:#6B3300;
  --gold:#C8941A;--goldl:#E5B84A;--golds:#A07015;
  --bg:#FFF8F2;--card:#ffffff;--bgsub:#F5EDE0;
  --text:#1a0800;--text2:#8a7364;
  --border:rgba(107,51,0,.14);
  --sh:0 8px 28px rgba(13,4,0,.1);
  --sbw:380px;
  --fd:'Playfair Display',Georgia,serif;
  --fb:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  --cloja:#C8941A;--crevenda:#6B3300;--cretirada:#2F6B3A;--centrega:#2A5C8A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--text)}
a{color:inherit}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}

.app{display:flex;height:100vh;width:100vw}

/* ===== SIDEBAR ===== */
.side{
  width:var(--sbw);flex-shrink:0;background:var(--card);
  display:flex;flex-direction:column;z-index:20;
  box-shadow:6px 0 24px rgba(13,4,0,.08);
}
.side-head{background:linear-gradient(150deg,var(--br) 0%,var(--br3) 100%);padding:20px 20px 18px;color:#fff;position:relative;overflow:hidden}
.side-head::before{content:'🐧';position:absolute;right:-14px;bottom:-24px;font-size:96px;opacity:.08}
.side-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative}
.side-brand img{width:34px;height:34px;border-radius:9px}
.side-brand b{font-family:var(--fd);font-weight:900;font-size:16.5px}
.side-back{font-size:11.5px;color:rgba(255,255,255,.55);text-decoration:none;display:inline-block;margin-bottom:10px}
.side-back:hover{color:#fff}
.side-title{font-family:var(--fd);font-weight:900;font-size:1.3rem;position:relative}
.side-sub{font-size:12.5px;color:rgba(255,255,255,.6);margin-top:4px;position:relative}

.search-box{padding:14px 16px 10px;position:relative}
.search-box input{
  width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--bgsub);font-size:13.5px;font-family:inherit;color:var(--text)
}
.search-box input:focus{outline:2px solid var(--gold)}

.suggest{
  position:absolute;left:16px;right:16px;top:calc(100% - 4px);z-index:50;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  box-shadow:var(--sh);max-height:280px;overflow-y:auto;display:none
}
.suggest.show{display:block}
.suggest-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;
  border-bottom:1px solid var(--border)
}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover,.suggest-item.hl{background:var(--bgsub)}
.si-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff}
.si-txt{min-width:0;flex:1}
.si-name{font-family:var(--fd);font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-addr{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-empty{padding:12px;font-size:12px;color:var(--text2);text-align:center}

.chips{display:flex;gap:6px;padding:2px 16px 12px;flex-wrap:wrap}
.chip{
  border:1px solid var(--border);background:var(--card);color:var(--text2);
  padding:6px 11px;border-radius:999px;font-size:11.5px;font-weight:800;
  display:flex;align-items:center;gap:5px;transition:.15s
}
.chip.on{background:var(--br);color:#fff;border-color:var(--br)}
.chip:hover:not(.on){background:var(--bgsub)}

.geo-btn{
  margin:0 16px 12px;padding:9px 12px;border-radius:12px;border:1px dashed var(--gold);
  background:#FFF3DC;color:var(--golds);font-size:12.5px;font-weight:800;text-align:center
}
.geo-btn:hover{background:#FBE7C6}
.geo-btn.active{background:var(--gold);color:#fff;border-style:solid}

.list{flex:1;overflow-y:auto;padding:0 12px 16px}
.place-card{
  background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);
  border-radius:14px;padding:13px 14px;margin-bottom:9px;transition:.15s;
}
.place-card:hover{box-shadow:var(--sh);transform:translateY(-1px)}
.place-card.active{background:var(--bgsub);box-shadow:var(--sh)}
.pc-top{display:flex;align-items:flex-start;gap:9px}
.pc-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:#fff}
.pc-name{font-family:var(--fd);font-weight:900;font-size:14.5px;line-height:1.25;flex:1}
.pc-dist{font-size:10.5px;font-weight:800;color:var(--golds);white-space:nowrap}
.pc-cat{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--text2);margin:3px 0 2px}
.pc-addr{font-size:12px;color:var(--text2);line-height:1.4}
.pc-desc{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.45}
.pc-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.pc-actions .pc-btn{flex:1 1 auto;min-width:84px}
.pc-btn{
  flex:1;text-align:center;padding:7px 8px;border-radius:9px;font-size:11.5px;font-weight:800;
  text-decoration:none;border:1px solid var(--border);color:var(--text)
}
.pc-btn.primary{background:var(--br);color:#fff;border-color:var(--br)}
.pc-btn:hover{opacity:.85}

.empty-state{padding:44px 22px;text-align:center;color:var(--text2)}
.empty-state .es-emoji{font-size:44px;margin-bottom:10px}
.empty-state b{display:block;font-family:var(--fd);font-size:15px;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:12.5px;line-height:1.5}

/* ===== MAP ===== */
.mapwrap{flex:1;position:relative;min-width:0}
#map{position:absolute;inset:0}
#globeContainer{position:absolute;inset:0;background:#000;display:none}
#globeContainer.on{display:block}

.view-toggle{
  position:absolute;top:16px;right:16px;z-index:500;display:flex;gap:6px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:5px;border-radius:14px;
  box-shadow:var(--sh)
}
.vt-btn{
  border:none;background:transparent;color:var(--text2);padding:8px 14px;border-radius:10px;
  font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:6px;transition:.15s
}
.vt-btn.on{background:var(--br);color:#fff}

.globe-info{
  position:absolute;left:20px;bottom:20px;z-index:500;max-width:320px;
  background:var(--card);border-radius:16px;box-shadow:var(--sh);padding:16px 18px;
  border-left:4px solid var(--gold);display:none
}
.globe-info.show{display:block}
.gi-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text2);font-size:15px}
.globe-hint{
  position:absolute;left:50%;top:16px;transform:translateX(-50%);z-index:400;
  background:rgba(0,0,0,.5);color:#fff;padding:7px 16px;border-radius:999px;font-size:11.5px;font-weight:700;
  pointer-events:none;transition:opacity .4s
}
.leaflet-popup-content-wrapper{border-radius:14px;font-family:var(--fb)}
.pop-name{font-family:var(--fd);font-weight:900;font-size:14.5px;margin-bottom:2px}
.pop-cat{font-size:10.5px;font-weight:800;text-transform:uppercase;color:var(--golds);margin-bottom:6px}
.pop-addr{font-size:12px;color:var(--text2);margin-bottom:6px}
.pop-desc{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.pop-actions{display:flex;gap:6px;flex-wrap:wrap}
.pop-actions a{
  flex:1 1 auto;min-width:78px;text-align:center;padding:6px 8px;border-radius:8px;font-size:11px;font-weight:800;
  text-decoration:none;border:1px solid var(--border)
}
.pop-actions a.primary{background:var(--br);color:#fff;border-color:var(--br)}

.marker-pin{
  width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.35);
  border:2px solid #fff
}
.marker-pin span{transform:rotate(45deg);font-size:14px}
.user-dot{width:16px;height:16px;border-radius:50%;background:#2A5C8A;border:3px solid #fff;box-shadow:0 0 0 4px rgba(42,92,138,.25)}

/* ===== MODO PESSOA (andar pelas ruas) ===== */
.avatar-pin{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.45));transition:transform .25s
}
.avatar-pin .cone{
  position:absolute;width:0;height:0;border-left:19px solid transparent;border-right:19px solid transparent;
  border-bottom:34px solid rgba(42,92,138,.22);top:-2px;transform-origin:50% 100%
}
.avatar-pin .dot{
  width:26px;height:26px;border-radius:50%;background:var(--br);border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 0 3px rgba(26,10,0,.18);z-index:2
}

.street-bar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:500;
  background:rgba(26,10,0,.88);color:#fff;padding:10px 20px;border-radius:14px;
  text-align:center;min-width:220px;max-width:88vw;display:none;box-shadow:var(--sh)
}
.street-bar.show{display:block}
.street-bar b{font-family:var(--fd);font-size:14px;display:block}
.street-bar span{font-size:11px;color:rgba(255,255,255,.65)}
.sv-pessoa-btn{
  display:inline-block;margin-top:7px;background:var(--gold);color:#fff;border:none;
  padding:6px 14px;border-radius:9px;font-size:11.5px;font-weight:800;text-decoration:none
}
.sv-pessoa-btn:hover{background:var(--goldl)}

.dpad{
  position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:500;
  display:none;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:4px
}
.dpad.show{display:grid}
.dpad button{
  background:rgba(26,10,0,.82);color:#fff;border:none;border-radius:12px;font-size:18px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25)
}
.dpad button:active{background:var(--gold)}
.dpad .dp-n{grid-column:2;grid-row:1}
.dpad .dp-w{grid-column:1;grid-row:2}
.dpad .dp-center{grid-column:2;grid-row:2;background:var(--gold);font-size:20px}
.dpad .dp-e{grid-column:3;grid-row:2}
.dpad .dp-s{grid-column:2;grid-row:3}

.exit-pessoa{
  position:absolute;top:16px;left:20px;z-index:500;display:none;
  background:rgba(255,255,255,.92);color:var(--text);border:none;padding:9px 15px;
  border-radius:12px;font-size:12px;font-weight:800;box-shadow:var(--sh)
}
.exit-pessoa.show{display:block}

/* ===== MODAL VISTA REAL (embutido, sem sair do site) ===== */
.sv-modal{
  position:fixed;inset:0;z-index:2000;background:#000;
  display:none;flex-direction:column
}
.sv-modal.show{display:flex}
.sv-modal-box{
  width:100%;height:100%;background:#000;
  display:flex;flex-direction:column
}
.sv-modal-head{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--br);color:#fff;padding:14px 18px;font-family:var(--fd);font-weight:900;font-size:15.5px;
  flex-shrink:0
}
.sv-modal-head button{
  background:rgba(255,255,255,.1);border:none;color:#fff;font-size:16px;
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center
}
.sv-modal-head button:hover{background:rgba(255,255,255,.22)}
.sv-modal-box iframe{flex:1;width:100%;border:none}

.toggle-mob{display:none}

@media (max-width:860px){
  .app{flex-direction:column}
  .side{width:100%;height:52vh;box-shadow:0 6px 20px rgba(13,4,0,.1)}
  .mapwrap{flex:1;height:48vh}
  :root{--sbw:100%}
}
</style>
</head>
<body>

<div class="app">
  <aside class="side">
    <div class="side-head">
      <a href="/" class="side-back">&larr; Voltar ao site</a>
      <div class="side-brand">
        <img src="../imagens/logo2.png" alt="Chocopingu" />
        <b>Chocopingu</b>
      </div>
      <div class="side-title">&#127757; Mundo Chocopingu</div>
      <div class="side-sub">Lojas, revendas, retirada e entrega perto de você.</div>
    </div>

    <div class="search-box">
      <input type="text" id="busca" placeholder="Buscar por nome ou endereço..." autocomplete="off" />
      <div class="suggest" id="sugestoes"></div>
    </div>
    <div class="chips" id="chips"></div>
    <button class="geo-btn" id="btnGeo">&#128205; Usar minha localização</button>

    <div class="list" id="lista"></div>
  </aside>

  <div class="mapwrap">
    <div class="view-toggle">
      <button class="vt-btn on" id="btnViewMap">🗺️ Mapa</button>
      <button class="vt-btn" id="btnViewGlobe">🌍 Globo 3D</button>
      <button class="vt-btn" id="btnViewPessoa">🚶 Modo Pessoa</button>
    </div>
    <div id="map"></div>
    <div id="globeContainer"></div>
    <div class="globe-hint" id="globeHint" style="display:none">Arraste para girar o globo &middot; clique num ponto</div>
    <div class="globe-info" id="globeInfo"></div>

    <button class="exit-pessoa" id="btnSairPessoa">&larr; Sair do modo pessoa</button>
    <div class="street-bar" id="streetBar">
      <b id="streetBarRua">Localizando...</b><span id="streetBarBairro"></span>
      <button class="sv-pessoa-btn" id="btnSVPessoa">👁️ Ver essa rua de verdade</button>
    </div>
    <div class="dpad" id="dpad">
      <button class="dp-n" id="dpN">&#8593;</button>
      <button class="dp-w" id="dpW">&#8592;</button>
      <button class="dp-center" id="dpCenter">🚶</button>
      <button class="dp-e" id="dpE">&#8594;</button>
      <button class="dp-s" id="dpS">&#8595;</button>
    </div>
  </div>
</div>

<div class="sv-modal" id="svModal">
  <div class="sv-modal-box">
    <div class="sv-modal-head">
      <span id="svModalTitle">👁️ Vista real</span>
      <button id="svClose">&#10005;</button>
    </div>
    <iframe id="svModalFrame" src="about:blank" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/globe.gl@2"></script>
<script>
const CATS = {
  loja:     { label: 'Loja Chocopingu',   emoji: '🏪', color: '#C8941A' },
  revenda:  { label: 'Ponto de Revenda',  emoji: '🛍️', color: '#6B3300' },
  retirada: { label: 'Ponto de Retirada', emoji: '📦', color: '#2F6B3A' },
  entrega:  { label: 'Área de Entrega',   emoji: '🚚', color: '#2A5C8A' }
};
const RECIFE = [-8.0476, -34.8770];

let lugares = [];
let markers = {};
let ativos = new Set(Object.keys(CATS));
let userPos = null;
let userMarker = null;

const map = L.map('map', { zoomControl: true }).setView(RECIFE, 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

function pinIcon(categoria) {
  const c = CATS[categoria] || CATS.loja;
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin" style="background:${c.color}"><span>${c.emoji}</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 30],
    popupAnchor: [0, -28]
  });
}

function normaliza(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function distKm(a, b) {
  const R = 6371;
  const dLat = (b[0]-a[0]) * Math.PI/180;
  const dLng = (b[1]-a[1]) * Math.PI/180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function vistaRealEmbedUrl(lat, lng) {
  return `https://maps.google.com/maps?q=${lat},${lng}&z=20&t=h&output=embed`;
}

function abrirVistaReal(lat, lng, titulo) {
  document.getElementById('svModalTitle').textContent = titulo ? `👁️ ${titulo}` : '👁️ Vista real';
  document.getElementById('svModalFrame').src = vistaRealEmbedUrl(lat, lng);
  document.getElementById('svModal').classList.add('show');
}

function abrirVistaRealPorId(id) {
  const l = lugares.find(x => String(x.id) === String(id));
  if (!l) return;
  abrirVistaReal(l.latitude, l.longitude, l.nome);
}

function fecharVistaReal() {
  document.getElementById('svModal').classList.remove('show');
  document.getElementById('svModalFrame').src = 'about:blank';
}

function popupHtml(l) {
  const c = CATS[l.categoria] || CATS.loja;
  const wa = l.whatsapp ? `https://wa.me/${String(l.whatsapp).replace(/\D/g,'')}` : null;
  const dir = `https://www.google.com/maps/dir/?api=1&destination=${l.latitude},${l.longitude}`;
  return `
    <div class="pop-name">${c.emoji} ${l.nome}</div>
    <div class="pop-cat">${c.label}</div>
    ${l.endereco ? `<div class="pop-addr">📍 ${l.endereco}</div>` : ''}
    ${l.descricao ? `<div class="pop-desc">${l.descricao}</div>` : ''}
    <div class="pop-actions">
      <a class="primary" href="javascript:void(0)" onclick="abrirVistaRealPorId('${l.id}')">👁️ Ver rua real</a>
      <a href="${dir}" target="_blank" rel="noopener">Como chegar</a>
      ${wa ? `<a href="${wa}" target="_blank" rel="noopener">WhatsApp</a>` : ''}
    </div>`;
}

function renderChips() {
  const el = document.getElementById('chips');
  const total = `<button class="chip on" data-cat="__all">Todos</button>`;
  const rest = Object.entries(CATS).map(([k, c]) =>
    `<button class="chip on" data-cat="${k}">${c.emoji} ${c.label}</button>`
  ).join('');
  el.innerHTML = total + rest;
  el.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (cat === '__all') {
      ativos = new Set(Object.keys(CATS));
      el.querySelectorAll('.chip').forEach(b => b.classList.add('on'));
    } else {
      if (ativos.has(cat)) ativos.delete(cat); else ativos.add(cat);
      btn.classList.toggle('on');
      el.querySelector('.chip[data-cat="__all"]').classList.toggle('on', ativos.size === Object.keys(CATS).length);
    }
    aplicarFiltro();
  }));
}

function aplicarFiltro() {
  const termo = normaliza(document.getElementById('busca').value);
  const visiveis = lugares.filter(l =>
    ativos.has(l.categoria) &&
    (!termo || normaliza(l.nome).includes(termo) || normaliza(l.endereco).includes(termo))
  );
  Object.entries(markers).forEach(([id, m]) => {
    const show = visiveis.some(v => String(v.id) === id);
    if (show && !map.hasLayer(m)) m.addTo(map);
    if (!show && map.hasLayer(m)) map.removeLayer(m);
  });
  renderLista(visiveis);
  atualizarGlobo();
}

function renderLista(visiveis) {
  const el = document.getElementById('lista');
  if (lugares.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="es-emoji">🗺️</div>
      <b>O mapa está sendo montado</b>
      <p>Em breve você encontra aqui as lojas, pontos de revenda e retirada da Chocopingu perto de você.</p>
    </div>`;
    return;
  }
  if (visiveis.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="es-emoji">🔍</div>
      <b>Nada encontrado</b>
      <p>Tente outro termo de busca ou ative mais categorias.</p>
    </div>`;
    return;
  }
  let ordenados = visiveis;
  if (userPos) {
    ordenados = [...visiveis].sort((a, b) =>
      distKm(userPos, [a.latitude, a.longitude]) - distKm(userPos, [b.latitude, b.longitude])
    );
  }
  el.innerHTML = ordenados.map(l => {
    const c = CATS[l.categoria] || CATS.loja;
    const dist = userPos ? distKm(userPos, [l.latitude, l.longitude]) : null;
    return `<div class="place-card" data-id="${l.id}">
      <div class="pc-top">
        <div class="pc-icon" style="background:${c.color}">${c.emoji}</div>
        <div class="pc-name">${l.nome}</div>
        ${dist !== null ? `<div class="pc-dist">${dist < 1 ? Math.round(dist*1000)+' m' : dist.toFixed(1)+' km'}</div>` : ''}
      </div>
      <div class="pc-cat">${c.label}</div>
      ${l.endereco ? `<div class="pc-addr">${l.endereco}</div>` : ''}
      ${l.descricao ? `<div class="pc-desc">${l.descricao}</div>` : ''}
      <div class="pc-actions">
        <a class="pc-btn primary" href="javascript:void(0)" onclick="focarLugar('${l.id}')">Ver no mapa</a>
        <a class="pc-btn" href="javascript:void(0)" onclick="event.stopPropagation();abrirVistaRealPorId('${l.id}')">👁️ Rua real</a>
        ${l.whatsapp ? `<a class="pc-btn" href="https://wa.me/${String(l.whatsapp).replace(/\D/g,'')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">WhatsApp</a>` : ''}
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.place-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      focarLugar(card.dataset.id);
    });
  });
}

window.focarLugar = function(id) {
  const l = lugares.find(x => String(x.id) === String(id));
  if (!l) return;
  ultimoFoco = l;
  if (currentView === 'globe') {
    mostrarInfoGlobo(l);
    if (world) world.pointOfView({ lat: l.latitude, lng: l.longitude, altitude: 0.35 }, 900);
  } else if (currentView === 'pessoa') {
    moverAvatarPara([l.latitude, l.longitude]);
    map.setView([l.latitude, l.longitude], 18);
  } else {
    map.flyTo([l.latitude, l.longitude], 16, { duration: .6 });
    const m = markers[id];
    if (m) setTimeout(() => m.openPopup(), 350);
  }
  document.querySelectorAll('.place-card').forEach(c => c.classList.toggle('active', c.dataset.id === String(id)));
};

// ===== GLOBO 3D (estilo Google Earth) =====
let world = null;
let currentView = 'map';

function pontosGlobo() {
  const termo = normaliza(document.getElementById('busca').value);
  return lugares.filter(l =>
    ativos.has(l.categoria) &&
    (!termo || normaliza(l.nome).includes(termo) || normaliza(l.endereco).includes(termo))
  );
}

function mostrarInfoGlobo(l) {
  const c = CATS[l.categoria] || CATS.loja;
  const wa = l.whatsapp ? `https://wa.me/${String(l.whatsapp).replace(/\D/g,'')}` : null;
  const dir = `https://www.google.com/maps/dir/?api=1&destination=${l.latitude},${l.longitude}`;
  const box = document.getElementById('globeInfo');
  box.innerHTML = `
    <button class="gi-close" onclick="document.getElementById('globeInfo').classList.remove('show')">&#10005;</button>
    <div class="pop-name">${c.emoji} ${l.nome}</div>
    <div class="pop-cat">${c.label}</div>
    ${l.endereco ? `<div class="pop-addr">📍 ${l.endereco}</div>` : ''}
    ${l.descricao ? `<div class="pop-desc">${l.descricao}</div>` : ''}
    <div class="pop-actions">
      <a class="primary" href="javascript:void(0)" onclick="abrirVistaRealPorId('${l.id}')">👁️ Ver rua real</a>
      <a href="${dir}" target="_blank" rel="noopener">Como chegar</a>
      ${wa ? `<a href="${wa}" target="_blank" rel="noopener">WhatsApp</a>` : ''}
    </div>`;
  box.classList.add('show');
}

function initGlobe() {
  if (world) return;
  const container = document.getElementById('globeContainer');
  world = Globe()(container)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .width(container.clientWidth)
    .height(container.clientHeight)
    .pointAltitude(0.02)
    .pointRadius(0.45)
    .pointColor(d => (CATS[d.categoria] || CATS.loja).color)
    .pointLabel(d => `${(CATS[d.categoria] || CATS.loja).emoji} ${d.nome}`)
    .onPointClick(d => {
      mostrarInfoGlobo(d);
      world.pointOfView({ lat: d.latitude, lng: d.longitude, altitude: 0.35 }, 900);
      document.querySelectorAll('.place-card').forEach(c => c.classList.toggle('active', c.dataset.id === String(d.id)));
    });
  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.6;
  world.pointOfView({ lat: RECIFE[0], lng: RECIFE[1], altitude: lugares.length ? 1.6 : 2.2 }, 0);
  window.addEventListener('resize', () => {
    if (currentView === 'globe') world.width(container.clientWidth).height(container.clientHeight);
  });
}

function atualizarGlobo() {
  if (!world) return;
  world.pointsData(pontosGlobo().map(l => ({ ...l, lat: l.latitude, lng: l.longitude })));
}

function trocarView(view) {
  const anterior = currentView;
  currentView = view;
  document.getElementById('btnViewMap').classList.toggle('on', view === 'map');
  document.getElementById('btnViewGlobe').classList.toggle('on', view === 'globe');
  document.getElementById('btnViewPessoa').classList.toggle('on', view === 'pessoa');
  document.getElementById('map').style.display = view === 'globe' ? 'none' : 'block';
  document.getElementById('globeContainer').classList.toggle('on', view === 'globe');
  document.getElementById('globeHint').style.display = view === 'globe' ? 'block' : 'none';

  if (anterior === 'pessoa' && view !== 'pessoa') sairModoPessoa();

  if (view === 'globe') {
    document.getElementById('globeHint').style.opacity = '1';
    initGlobe();
    atualizarGlobo();
    setTimeout(() => { document.getElementById('globeHint').style.opacity = '0'; }, 3500);
  } else {
    document.getElementById('globeInfo').classList.remove('show');
    setTimeout(() => map.invalidateSize(), 50);
    if (view === 'pessoa') entrarModoPessoa();
  }
}

document.getElementById('btnViewMap').addEventListener('click', () => trocarView('map'));
document.getElementById('btnViewGlobe').addEventListener('click', () => trocarView('globe'));
document.getElementById('btnViewPessoa').addEventListener('click', () => trocarView('pessoa'));
document.getElementById('btnSairPessoa').addEventListener('click', () => trocarView('map'));

// ===== MODO PESSOA (andar pelas ruas como um pedestre) =====
let ultimoFoco = null;
let avatarPos = null;
let avatarHeading = 0;
let avatarMarker = null;
let geoTimer = null;

function avatarIcon(heading) {
  return L.divIcon({
    className: '',
    html: `<div class="avatar-pin"><div class="cone" style="transform:rotate(${heading}deg)"></div><div class="dot">🐧</div></div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19]
  });
}

function bearing(a, b) {
  const lat1 = a[0] * Math.PI / 180, lat2 = b[0] * Math.PI / 180;
  const dLng = (b[1] - a[1]) * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

async function atualizarRua(pos) {
  const ruaEl = document.getElementById('streetBarRua');
  const bairroEl = document.getElementById('streetBarBairro');
  ruaEl.textContent = '📍 Localizando...';
  bairroEl.textContent = '';
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos[0]}&lon=${pos[1]}&zoom=18&addressdetails=1`);
    const data = await resp.json();
    const a = data.address || {};
    const rua = a.road || a.pedestrian || a.footway || a.path || 'Rua sem nome no mapa';
    const bairro = a.suburb || a.neighbourhood || a.city_district || a.village || '';
    const cidade = a.city || a.town || a.municipality || '';
    ruaEl.textContent = '📍 ' + rua;
    bairroEl.textContent = [bairro, cidade].filter(Boolean).join(' — ') || 'Bairro não identificado';
  } catch (e) {
    ruaEl.textContent = '📍 Não foi possível identificar a rua';
    bairroEl.textContent = '';
  }
}

function agendarGeocode() {
  clearTimeout(geoTimer);
  geoTimer = setTimeout(() => atualizarRua(avatarPos), 700);
}

function moverAvatarPara(novaPos) {
  avatarHeading = bearing(avatarPos || novaPos, novaPos);
  avatarPos = novaPos;
  avatarMarker.setLatLng(avatarPos).setIcon(avatarIcon(avatarHeading));
  map.panTo(avatarPos, { animate: true, duration: .4 });
  agendarGeocode();
}

function moverDirecao(dir) {
  const metros = 18;
  const dLat = metros / 111320;
  const dLng = metros / (111320 * Math.cos(avatarPos[0] * Math.PI / 180));
  const novaPos = [...avatarPos];
  let heading = avatarHeading;
  if (dir === 'n') { novaPos[0] += dLat; heading = 0; }
  if (dir === 's') { novaPos[0] -= dLat; heading = 180; }
  if (dir === 'e') { novaPos[1] += dLng; heading = 90; }
  if (dir === 'w') { novaPos[1] -= dLng; heading = 270; }
  avatarPos = novaPos;
  avatarHeading = heading;
  avatarMarker.setLatLng(avatarPos).setIcon(avatarIcon(heading));
  map.panTo(avatarPos, { animate: true, duration: .25 });
  agendarGeocode();
}

function onMapClickPessoa(e) {
  if (currentView !== 'pessoa') return;
  moverAvatarPara([e.latlng.lat, e.latlng.lng]);
}

function onKeyPessoa(e) {
  if (currentView !== 'pessoa') return;
  if (e.key === 'ArrowUp') moverDirecao('n');
  if (e.key === 'ArrowDown') moverDirecao('s');
  if (e.key === 'ArrowLeft') moverDirecao('w');
  if (e.key === 'ArrowRight') moverDirecao('e');
}

function entrarModoPessoa() {
  if (!avatarPos) {
    avatarPos = userPos || (ultimoFoco ? [ultimoFoco.latitude, ultimoFoco.longitude] : RECIFE);
  }
  map.setView(avatarPos, 18);
  if (!avatarMarker) {
    avatarMarker = L.marker(avatarPos, { icon: avatarIcon(avatarHeading), zIndexOffset: 1000 }).addTo(map);
  } else {
    avatarMarker.setLatLng(avatarPos).addTo(map);
  }
  document.getElementById('dpad').classList.add('show');
  document.getElementById('streetBar').classList.add('show');
  document.getElementById('btnSairPessoa').classList.add('show');
  atualizarRua(avatarPos);
  document.addEventListener('keydown', onKeyPessoa);
}

function sairModoPessoa() {
  document.getElementById('dpad').classList.remove('show');
  document.getElementById('streetBar').classList.remove('show');
  document.getElementById('btnSairPessoa').classList.remove('show');
  document.removeEventListener('keydown', onKeyPessoa);
  if (avatarMarker) map.removeLayer(avatarMarker);
}

map.on('click', onMapClickPessoa);
document.getElementById('dpN').addEventListener('click', () => moverDirecao('n'));
document.getElementById('dpS').addEventListener('click', () => moverDirecao('s'));
document.getElementById('dpE').addEventListener('click', () => moverDirecao('e'));
document.getElementById('dpW').addEventListener('click', () => moverDirecao('w'));
document.getElementById('dpCenter').addEventListener('click', () => map.setView(avatarPos, 18));
document.getElementById('btnSVPessoa').addEventListener('click', () => {
  if (avatarPos) abrirVistaReal(avatarPos[0], avatarPos[1], 'Sua localização');
});
document.getElementById('svClose').addEventListener('click', fecharVistaReal);
document.getElementById('svModal').addEventListener('click', (e) => { if (e.target.id === 'svModal') fecharVistaReal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('svModal').classList.contains('show')) fecharVistaReal();
});

// ===== AUTOCOMPLETE da busca =====
let sugestaoIdx = -1;

function itensSugestao(termo) {
  return lugares.filter(l =>
    ativos.has(l.categoria) &&
    (normaliza(l.nome).includes(termo) || normaliza(l.endereco).includes(termo))
  );
}

function renderSugestoes() {
  const box = document.getElementById('sugestoes');
  const termo = normaliza(document.getElementById('busca').value);
  sugestaoIdx = -1;
  if (!termo) { box.classList.remove('show'); box.innerHTML = ''; return; }
  const itens = itensSugestao(termo).slice(0, 8);
  if (itens.length === 0) {
    box.innerHTML = `<div class="suggest-empty">Nenhum lugar encontrado — continue digitando ou ajuste os filtros.</div>`;
    box.classList.add('show');
    return;
  }
  box.innerHTML = itens.map(l => {
    const c = CATS[l.categoria] || CATS.loja;
    return `<div class="suggest-item" data-id="${l.id}">
      <div class="si-icon" style="background:${c.color}">${c.emoji}</div>
      <div class="si-txt">
        <div class="si-name">${l.nome}</div>
        ${l.endereco ? `<div class="si-addr">${l.endereco}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  box.querySelectorAll('.suggest-item').forEach(item => {
    item.addEventListener('mousedown', (e) => {
      e.preventDefault();
      selecionarSugestao(item.dataset.id);
    });
  });
  box.classList.add('show');
}

function selecionarSugestao(id) {
  const l = lugares.find(x => String(x.id) === String(id));
  if (!l) return;
  document.getElementById('busca').value = l.nome;
  fecharSugestoes();
  aplicarFiltro();
  focarLugar(id);
}

function fecharSugestoes() {
  const box = document.getElementById('sugestoes');
  box.classList.remove('show');
  box.innerHTML = '';
  sugestaoIdx = -1;
}

function moverSugestao(delta) {
  const box = document.getElementById('sugestoes');
  const items = [...box.querySelectorAll('.suggest-item')];
  if (items.length === 0) return;
  sugestaoIdx = (sugestaoIdx + delta + items.length) % items.length;
  items.forEach((it, i) => it.classList.toggle('hl', i === sugestaoIdx));
  items[sugestaoIdx].scrollIntoView({ block: 'nearest' });
}

document.getElementById('busca').addEventListener('input', () => { aplicarFiltro(); renderSugestoes(); });
document.getElementById('busca').addEventListener('focus', renderSugestoes);
document.getElementById('busca').addEventListener('blur', () => setTimeout(fecharSugestoes, 120));
document.getElementById('busca').addEventListener('keydown', (e) => {
  const box = document.getElementById('sugestoes');
  if (!box.classList.contains('show')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); moverSugestao(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moverSugestao(-1); }
  else if (e.key === 'Enter') {
    const hl = box.querySelector('.suggest-item.hl');
    if (hl) { e.preventDefault(); selecionarSugestao(hl.dataset.id); }
  } else if (e.key === 'Escape') fecharSugestoes();
});

document.getElementById('btnGeo').addEventListener('click', function() {
  const btn = this;
  if (!navigator.geolocation) { alert('Seu navegador não suporta localização.'); return; }
  btn.textContent = '📍 Localizando...';
  navigator.geolocation.getCurrentPosition(pos => {
    userPos = [pos.coords.latitude, pos.coords.longitude];
    btn.textContent = '✅ Localização ativa';
    btn.classList.add('active');
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker(userPos, {
      icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] })
    }).addTo(map).bindPopup('Você está aqui');
    map.setView(userPos, 13);
    aplicarFiltro();
  }, () => {
    btn.textContent = '📍 Usar minha localização';
    alert('Não foi possível obter sua localização.');
  });
});

async function carregar() {
  try {
    const resp = await fetch('/api/chocopontos-config?tipo=lugares');
    const data = await resp.json();
    lugares = Array.isArray(data) ? data : [];
  } catch (e) {
    lugares = [];
  }
  markers = {};
  lugares.forEach(l => {
    const m = L.marker([l.latitude, l.longitude], { icon: pinIcon(l.categoria) })
      .bindPopup(popupHtml(l));
    markers[l.id] = m;
  });
  renderChips();
  aplicarFiltro();
  if (lugares.length > 0) {
    const bounds = L.latLngBounds(lugares.map(l => [l.latitude, l.longitude]));
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }
}
carregar();
</script>
